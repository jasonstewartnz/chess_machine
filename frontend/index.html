<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Chess</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel">
      <h1>Chess Engine</h1>
      <p>Lisp Backend &bull; Vanilla JS Frontend</p>
      <div class="controls">
        <button id="reset-btn" class="glass-btn">New Game</button>
        <button id="undo-btn" class="glass-btn">Undo</button>
        <button id="clear-board-btn" class="glass-btn explore-only" style="display: none;">Clear Board</button>
        <select id="mode-select" class="glass-btn">
          <option value="game">Game Mode</option>
          <option value="explore">Explore Mode</option>
        </select>
      </div>
    </header>
    
    <main class="board-container glass-panel">
      <div class="player-info" id="black-player-info">
        <span class="player-name">Black</span>
        <span id="black-score" class="score-display"></span>
      </div>
      <div class="piece-palette" id="white-palette"></div>
      <div class="board-wrapper">
        <div class="eval-bar">
          <div id="eval-fill" style="height: 50%;"></div>
          <span id="eval-text">0.0</span>
        </div>
        <div class="coordinates-ranks" id="ranks-coord"></div>
        <div id="chessboard" class="chessboard">
          <!-- Squares generated by JS -->
        </div>
        <div class="coordinates-files" id="files-coord"></div>
      </div>
      <div class="piece-palette" id="black-palette"></div>
      <div class="player-info" id="white-player-info">
        <span class="player-name">White</span>
        <span id="white-score" class="score-display"></span>
      </div>
    </main>

    <aside class="info-panel glass-panel">
      <h2>Game Status</h2>
      <div id="status-indicator">White to move</div>

      <div class="settings-section">
        <h3>Analysis</h3>
        <label class="switch">
          <input type="checkbox" id="analysis-toggle">
          <span class="slider round"></span>
        </label>
        <span>Enable Stockfish</span>
        <button id="scan-game-btn" class="glass-btn small" style="margin-left: 10px;">Tactical Scan</button>
      </div>

      <div class="moves-history" id="moves-history">
        <!-- Move history -->
      </div>

      <div class="fen-container">
        <h3>Position (FEN)</h3>
        <input type="text" id="fen-input" class="glass-input" placeholder="FEN string...">
        <div class="fen-controls">
          <button id="copy-fen-btn" class="glass-btn small">Copy</button>
          <button id="load-fen-btn" class="glass-btn small">Load</button>
        </div>
      </div>
      <section class="pgn-container">
        <h3>Game Navigation</h3>
        <textarea id="pgn-input" placeholder="Paste PGN here..."></textarea>
        <div class="pgn-controls">
          <input type="file" id="pgn-file-input" style="display: none;" accept=".pgn">
          <button id="browse-pgn-btn" class="glass-btn">Browse Files</button>
          <button id="load-pgn-btn" class="glass-btn">Load Paste</button>
        </div>
        <div id="game-list-container" class="game-list" style="display: none;">
          <h4>Select Game</h4>
          <ul id="game-list"></ul>
        </div>
        <div class="nav-controls" id="nav-controls" style="display: none;">
          <button id="prev-move-btn" class="glass-btn">←</button>
          <span id="move-index">0 / 0</span>
          <button id="next-move-btn" class="glass-btn">→</button>
        </div>
      </section>
    </aside>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
