<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Chess</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel">
      <h1>Chess Engine</h1>
      <p>Lisp Backend &bull; Vanilla JS Frontend</p>
      <div class="controls">
        <button id="reset-btn" class="glass-btn">New Game</button>
      </div>
    </header>
    
    <main class="board-container glass-panel">
      <div id="chessboard" class="chessboard">
        <!-- Squares generated by JS -->
      </div>
    </main>

    <aside class="info-panel glass-panel">
      <h2>Game Status</h2>
      <div id="status-indicator">White to move</div>
      <div class="moves-history" id="moves-history">
        <!-- Move history -->
      </div>
    </aside>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
