<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Chess</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel">
      <h1>Chess Engine</h1>
      <p>Lisp Backend &bull; Vanilla JS Frontend</p>
      <div class="controls">
        <button id="reset-btn" class="glass-btn">New Game</button>
        <button id="undo-btn" class="glass-btn">Undo</button>
        <button id="clear-board-btn" class="glass-btn explore-only" style="display: none;">Clear Board</button>
        <select id="mode-select" class="glass-btn">
          <option value="game">Game Mode</option>
          <option value="explore">Explore Mode</option>
        </select>
      </div>
    </header>
    
    <main class="board-container glass-panel">
      <div class="player-info" id="black-player-info">
        <span class="player-name">Black</span>
        <span id="black-score" class="score-display"></span>
      </div>
      <div class="piece-palette" id="white-palette"></div>
      <div class="board-wrapper">
        <div class="coordinates-ranks" id="ranks-coord"></div>
        <div id="chessboard" class="chessboard">
          <!-- Squares generated by JS -->
        </div>
        <div class="coordinates-files" id="files-coord"></div>
      </div>
      <div class="piece-palette" id="black-palette"></div>
      <div class="player-info" id="white-player-info">
        <span class="player-name">White</span>
        <span id="white-score" class="score-display"></span>
      </div>
    </main>

    <aside class="info-panel glass-panel">
      <h2>Game Status</h2>
      <div id="status-indicator">White to move</div>

      <div class="moves-history" id="moves-history">
        <!-- Move history -->
      </div>

      <div class="fen-container">
        <h3>Position (FEN)</h3>
        <input type="text" id="fen-input" class="glass-input" placeholder="FEN string...">
        <div class="fen-controls">
          <button id="copy-fen-btn" class="glass-btn small">Copy</button>
          <button id="load-fen-btn" class="glass-btn small">Load</button>
        </div>
      </div>
    </aside>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
